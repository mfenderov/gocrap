name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - run: go vet ./...
      - run: go test -race -coverprofile=coverage.out ./...
      - run: go run . -coverprofile coverage.out -threshold 5 -exclude '*_test.go' -exclude '*_mock.go' .
